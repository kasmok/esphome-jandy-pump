# ESPHome Jandy/Zodiac VS-FHP Pool Pump Controller v0.5.0
# https://github.com/kasmok/esphome-jandy-pump

substitutions:
  # Safety shutoff: seconds to wait after HA disconnects before stopping the pump.
  # Allows for HA reboots and brief network interruptions without stopping the pump.
  # Set to "0" to disable (pump keeps running indefinitely without HA).
  safety_shutoff_timeout: "120"

esphome:
  name: poolpump
  friendly_name: Pool Pump

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

# Enable logging (baud_rate: 0 disables UART logging so it doesn't interfere with RS485)
logger:
  baud_rate: 0
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret poolpump_api_encryption_key
  on_client_disconnected:
    then:
      - if:
          condition:
            lambda: 'return ${safety_shutoff_timeout} > 0;'
          then:
            - logger.log:
                format: "HA disconnected — pump safety shutoff in ${safety_shutoff_timeout}s"
                level: WARN
            - delay: ${safety_shutoff_timeout}s
            - if:
                condition:
                  not:
                    api.connected:
                then:
                  - logger.log:
                      format: "HA still disconnected — stopping pump for safety"
                      level: ERROR
                  - switch.turn_off: pump_switch
  on_client_connected:
    then:
      - logger.log:
          format: "HA connected"
          level: INFO

ota:
  - platform: esphome
    password: !secret poolpump_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Poolpump Fallback Hotspot"
    password: !secret fallback_ap_password

# ------------------------------------------------------------------
# Status LED (SK6812 on GPIO27) — Red/Yellow/Green connection status
# ------------------------------------------------------------------

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    rgb_order: GRB
    chipset: SK6812
    pin: GPIO27
    num_leds: 1
    name: "Status LED"
    internal: true

interval:
  - interval: 2s
    then:
      - if:
          condition:
            api.connected:
          then:
            - light.turn_on:
                id: status_led
                brightness: 30%
                red: 0
                green: 1
                blue: 0
          else:
            - if:
                condition:
                  wifi.connected:
                then:
                  - light.turn_on:
                      id: status_led
                      brightness: 30%
                      red: 1
                      green: 1
                      blue: 0
                else:
                  - light.turn_on:
                      id: status_led
                      brightness: 30%
                      red: 1
                      green: 0
                      blue: 0

# ------------------------------------------------------------------
# Jandy DLE protocol pump controller (replaces CenturyVSPump/modbus)
# ------------------------------------------------------------------

external_components:
  - source: github://kasmok/esphome-jandy-pump

uart:
  id: pump_uart
  tx_pin: GPIO19
  rx_pin: GPIO22
  baud_rate: 9600

jandypump:
  uart_id: pump_uart
  flow_control_pin: GPIO23
  update_interval: 2s

# ------------------------------------------------------------------
# Home Assistant entities
# ------------------------------------------------------------------

switch:
  - platform: jandypump
    name: "Pool Pump Run"
    id: pump_switch

sensor:
  - platform: jandypump
    name: "Pool Pump Current RPM"
    type: rpm
    unit_of_measurement: RPM
    icon: "mdi:speedometer"

  - platform: jandypump
    name: "Pool Pump Power"
    type: watts
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    icon: "mdi:flash"

  - platform: jandypump
    name: "Pool Pump Input Power"
    type: power
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    icon: "mdi:flash-outline"

  - platform: jandypump
    name: "Pool Pump Motor Current"
    type: current
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    accuracy_decimals: 3
    icon: "mdi:current-ac"

  - platform: jandypump
    name: "Pool Pump DC Bus Voltage"
    type: voltage
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    icon: "mdi:sine-wave"

number:
  - platform: jandypump
    name: "Pool Pump Target RPM"
    id: id_number_rpm
    unit_of_measurement: RPM
    icon: "mdi:speedometer"

button:
  - platform: template
    name: "Pool Pump 600 RPM"
    on_press:
      then:
        - number.set:
            id: id_number_rpm
            value: 600
  - platform: template
    name: "Pool Pump 2000 RPM"
    on_press:
      then:
        - number.set:
            id: id_number_rpm
            value: 2000
  - platform: template
    name: "Pool Pump 2600 RPM"
    on_press:
      then:
        - number.set:
            id: id_number_rpm
            value: 2600
  - platform: template
    name: "Pool Pump 3450 RPM"
    on_press:
      then:
        - number.set:
            id: id_number_rpm
            value: 3450
