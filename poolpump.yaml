esphome:
  name: poolpump
  friendly_name: Pool Pump

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

# Enable logging (baud_rate: 0 disables UART logging so it doesn't interfere with RS485)
logger:
  baud_rate: 0
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Poolpump Fallback Hotspot"
    password: !secret fallback_ap_password

# ------------------------------------------------------------------
# Jandy DLE protocol pump controller (replaces CenturyVSPump/modbus)
# ------------------------------------------------------------------

external_components:
  - source: components

uart:
  id: pump_uart
  tx_pin: GPIO19
  rx_pin: GPIO22
  baud_rate: 9600

jandypump:
  uart_id: pump_uart
  flow_control_pin: GPIO23
  update_interval: 2s

# ------------------------------------------------------------------
# Home Assistant entities
# ------------------------------------------------------------------

switch:
  - platform: jandypump
    name: "Pool Pump Run"

sensor:
  - platform: jandypump
    name: "Pool Pump Current RPM"
    type: rpm
    unit_of_measurement: RPM
    icon: "mdi:speedometer"

number:
  - platform: jandypump
    name: "Pool Pump Target RPM"
    id: id_number_rpm
    unit_of_measurement: RPM
    icon: "mdi:speedometer"

button:
  - platform: template
    name: "Pool Pump 600 RPM"
    on_press:
      then:
        - number.set:
            id: id_number_rpm
            value: 600
  - platform: template
    name: "Pool Pump 2600 RPM"
    on_press:
      then:
        - number.set:
            id: id_number_rpm
            value: 2600
  - platform: template
    name: "Pool Pump 3450 RPM"
    on_press:
      then:
        - number.set:
            id: id_number_rpm
            value: 3450
